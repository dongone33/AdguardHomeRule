name: Auto Update AdGuard Rules

on:
  schedule:
    - cron: '*/10 * * * *'
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  merge-adguard-rules:
    runs-on: ubuntu-latest
    concurrency:
      group: adguard-rules-update
      cancel-in-progress: true
    timeout-minutes: 20
    steps:
      - name: 检出代码库
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          persist-credentials: true
      
      - name: 设置Python环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: 安装依赖（增加重试机制）
        run: |
          for i in {1..3}; do
            echo "Attempt $i to install dependencies"
            if python -m pip install --upgrade pip && pip install requests; then
              echo "Dependencies installed successfully"
              break
            else
              echo "Attempt $i failed"
              if [ $i -eq 3 ]; then
                echo "All attempts failed"
                exit 1
              fi
              sleep 5
            fi
          done
      
      - name: 生成统一北京时间变量
        run: |
          UPDATED_TIME=$(TZ='Asia/Shanghai' date '+%Y-%m-%d %H:%M:%S')
          echo "UPDATED_TIME=$UPDATED_TIME" >> $GITHUB_ENV
          echo "统一时间戳: $UPDATED_TIME"
      
      - name: 运行规则更新脚本
        run: |
          python scripts/run_all.py
      
      - name: 配置Git环境
        run: |
          git config --local user.name 'github-actions[bot]'
          git config --local user.email 'github-actions[bot]@users.noreply.github.com'
      
      - name: 添加规则文件
        run: |
          git add -A
      
      - name: 提交更改并推送
        run: |
          BRANCH_NAME=${GITHUB_REF#refs/heads/}
          if [ -z "$BRANCH_NAME" ]; then BRANCH_NAME="main"; fi
          echo "推送至分支: $BRANCH_NAME"

          git checkout -B "$BRANCH_NAME"
          
          if ! git diff --staged --quiet; then
            git commit -m "Auto update rules at $UPDATED_TIME"
            
            for i in {1..3}; do
              echo "Attempt $i to push changes"
              if git push origin "$BRANCH_NAME"; then
                echo "Changes committed and pushed successfully"
                break
              else
                echo "Push attempt $i failed, trying to pull first"
                if git pull --rebase origin "$BRANCH_NAME"; then
                  echo "Pull successful, retrying push"
                  if git push origin "$BRANCH_NAME"; then
                    echo "Changes committed and pushed successfully after pull"
                    break
                  fi
                fi
                if [ $i -eq 3 ]; then
                  echo "All push attempts failed"
                  exit 1
                fi
                sleep 5
              fi
            done
          else
            echo "No changes to commit"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
